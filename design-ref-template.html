:root {
  /* Brand */
  --red: #EE312E;
  --red-hover: #D42825;
  --red-press: #B51F1D;

  /* Neutrals */
  --gray-1: #F3F3F3;
  --gray-2: #DADADA;
  --gray-3: #A0A2A5;
  --gray-4: #6F7377;
  --gray-5: #282E37;
  --white: #FFFFFF;
  --off-white: #FAFAFA;

  /* Link */
  --blue-3: #0B4CCE;

  /* Surfaces */
  --surface: #FFFFFF;
  --surface-alt: #FAFAFA;
  --surface-dark: #1A1E25;

  /* Type */
  --font-sans: 'Plus Jakarta Sans', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', ui-monospace, monospace;

  /* Spacing scale (8px base) */
  --s-1: 4px;
  --s-2: 8px;
  --s-3: 12px;
  --s-4: 16px;
  --s-5: 24px;
  --s-6: 32px;
  --s-7: 48px;
  --s-8: 64px;
  --s-9: 96px;
  --s-10: 128px;

  /* Radii */
  --r-sm: 2px;
  --r-md: 4px;
  --r-lg: 8px;

  /* Container */
  --container: 1280px;
  --container-wide: 1440px;
}

* { box-sizing: border-box; }

html, body {
  margin: 0;
  padding: 0;
  font-family: var(--font-sans);
  font-weight: 400;
  color: var(--gray-5);
  background: var(--white);
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  font-feature-settings: "ss01", "ss02";
}

body { font-size: 16px; line-height: 1.55; }

h1, h2, h3, h4, h5 {
  font-weight: 600;
  letter-spacing: -0.02em;
  color: var(--gray-5);
  margin: 0;
  text-wrap: balance;
}

p { margin: 0; text-wrap: pretty; }

a {
  color: var(--blue-3);
  text-decoration: none;
}
a:hover { text-decoration: none; opacity: 0.8; }

button { font-family: inherit; cursor: pointer; border: 0; background: none; }

/* Icon defaults — Material Symbols Sharp */
.material-symbols-sharp {
  font-family: 'Material Symbols Sharp';
  font-weight: 400;
  font-style: normal;
  font-size: 24px;
  line-height: 1;
  letter-spacing: normal;
  text-transform: none;
  display: inline-block;
  white-space: nowrap;
  word-wrap: normal;
  direction: ltr;
  font-feature-settings: 'liga';
  -webkit-font-feature-settings: 'liga';
  -webkit-font-smoothing: antialiased;
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
  user-select: none;
}

/* Container */
.container {
  max-width: var(--container);
  margin: 0 auto;
  padding: 0 var(--s-6);
}

/* Buttons */
.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: var(--s-2);
  font-family: var(--font-sans);
  font-weight: 500;
  font-size: 15px;
  line-height: 1;
  padding: 14px 22px;
  border-radius: var(--r-md);
  transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease;
  cursor: pointer;
  white-space: nowrap;
}
.btn-primary {
  background: var(--red);
  color: var(--white);
}
.btn-primary:hover { background: var(--red-hover); }
.btn-primary:active { background: var(--red-press); }

.btn-secondary {
  background: transparent;
  color: var(--gray-5);
  border: 1px solid var(--gray-2);
}
.btn-secondary:hover { border-color: var(--gray-4); }

.btn-ghost {
  background: transparent;
  color: var(--gray-5);
}
.btn-ghost:hover { color: var(--red); }

.btn-lg { padding: 16px 28px; font-size: 16px; }
.btn-sm { padding: 10px 16px; font-size: 14px; }

/* Top nav shared */
.topnav {
  border-bottom: 1px solid var(--gray-2);
  background: var(--white);
  position: sticky;
  top: 0;
  z-index: 40;
}
.topnav-inner {
  max-width: var(--container-wide);
  margin: 0 auto;
  padding: 0 var(--s-6);
  height: 72px;
  display: flex;
  align-items: center;
  gap: var(--s-7);
  position: relative;
}
.brand {
  display: flex;
  align-items: center;
  gap: var(--s-3);
  font-weight: 700;
  font-size: 18px;
  letter-spacing: -0.02em;
  color: var(--gray-5);
}
.brand-logo {
  height: 20px;
  width: auto;
  display: block;
}
.topnav-links {
  display: flex;
  gap: var(--s-6);
  font-size: 14px;
  color: var(--gray-4);
  font-weight: 500;
  position: absolute;
  left: 50%;
  top: 50%;
  transform: translate(-50%, -50%);
}
.topnav-links a { color: var(--gray-5); }
.topnav-links a:hover { color: var(--red); }
.topnav-links a.active { color: var(--gray-5); }
.topnav-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: var(--s-4);
}

/* Placeholder imagery */
.ph {
  position: relative;
  background: var(--gray-1);
  background-image: repeating-linear-gradient(
    135deg,
    transparent 0 14px,
    rgba(0,0,0,0.035) 14px 15px
  );
  overflow: hidden;
  display: grid;
  place-items: center;
}
.ph-label {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: 400;
  color: var(--gray-4);
  background: var(--white);
  padding: 4px 8px;
  letter-spacing: 0.02em;
}

/* Eyebrow / section header */
.eyebrow {
  font-family: var(--font-mono);
  font-size: 12px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--gray-4);
}

/* Divider */
.divider { height: 1px; background: var(--gray-2); border: 0; margin: 0; }

/* Badge / pill base */
.pill {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 4px 10px;
  font-size: 12px;
  font-weight: 500;
  line-height: 1.4;
  border-radius: 2px;
  background: var(--gray-1);
  color: var(--gray-5);
}

/* Focus */
:focus-visible {
  outline: 2px solid var(--blue-3);
  outline-offset: 2px;
}
</style>
  <style>/* Content card, sections, homepage styles */

/* ---------- Content card ---------- */
.cc {
  display: flex;
  flex-direction: column;
  color: inherit;
  text-decoration: none;
  background: var(--white);
  transition: transform 0.2s ease;
}
.cc:hover { transform: translateY(-2px); }
.cc:hover .cc-title { color: var(--gray-5); }
.cc:hover .ph { opacity: 0.95; }

.cc-body {
  padding: 24px 4px 8px;
  display: flex;
  flex-direction: column;
  gap: 12px;
}
.cc-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.cc-title {
  font-size: 20px;
  font-weight: 600;
  letter-spacing: -0.02em;

<script>
// Standalone-bundle bootstrap: rewrite LH_DATA image paths to blob URLs.
(function(){
  function waitForResources(cb){
    if (window.__resources) return cb();
    let n = 0;
    const t = setInterval(function(){
      if (window.__resources || n++ > 200) { clearInterval(t); cb(); }
    }, 25);
  }
  function resolve(p){
    if (!p) return p;
    var clean = String(p).split('?')[0];
    var id = clean.replace(/[^a-z0-9]+/gi,'_').replace(/^_|_$/g,'');
    return (window.__resources && window.__resources[id]) || p;
  }
  function patch(){
    var d = window.LH_DATA;
    if (!d) return;
    function fix(arr){ if (Array.isArray(arr)) arr.forEach(function(x){ if (x && x.image) x.image = resolve(x.image); }); }
    fix(d.popular); fix(d.newest); fix(d.partners); fix(d.library); fix(d.certifications);
    // Hero image referenced by string path
    window.__heroImg = resolve('assets/hero/professional.jpg');
    // Logos
    window.__logoLight = resolve('assets/diligent-logo.jpg');
    window.__logoDark  = resolve('assets/diligent-logo-reversed.png');
  }
  waitForResources(patch);
})();
</script>

  <script>
    // Run patch synchronously now that LH_DATA is loaded.
    if (window.__resources) {
      var ev = new Event('__resourcesReady'); window.dispatchEvent(ev);

      function fix(arr){ if(Array.isArray(arr)) arr.forEach(function(x){ if(x&&x.image) x.image=resolve(x.image); }); }
      var d=window.LH_DATA; if(d){ fix(d.popular); fix(d.newest); fix(d.partners); fix(d.library); fix(d.certifications); }
      window.__heroImg = resolve('assets/hero/professional.jpg');
      window.__logoLight = resolve('assets/diligent-logo.jpg');
      window.__logoDark  = resolve('assets/diligent-logo-reversed.png');
    })();
  </script>
